# CI for the Vite + pnpm stack
# Node version is driven by .nvmrc (mirrors package.json#engines.node ^22.0.0).
# pnpm version is driven by package.json#packageManager (read by pnpm/action-setup automatically).

name: Node.js CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ─── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Install the pnpm version pinned in package.json#packageManager
      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check (lint + format + typecheck)
        run: pnpm check

  # ─── Build ───────────────────────────────────────────────────────────────────
  build:
    name: build
    needs: [lint]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (Vite)
        run: pnpm build
        env:
          NODE_ENV: production
          # ── Site identity ────────────────────────────────────────────────────
          WELCOME_VERSION: 1.0
          DOMAIN: odysee.com
          URL: https://odysee.com
          SHARE_DOMAIN_URL: https://odysee.com
          SITE_TITLE: Odysee
          SITE_NAME: Odysee
          # ── Feature flags ────────────────────────────────────────────────────
          SHOW_ADS: false
          ENABLE_COMMENT_REACTIONS: true
          ENABLE_NO_SOURCE_CLAIMS: true
          # ── Localisation ─────────────────────────────────────────────────────
          DEFAULT_LANGUAGE: en
          KNOWN_APP_DOMAINS: lbry.tv,lbry.lat,odysee.com
          # ── Misc ─────────────────────────────────────────────────────────────
          CHANNEL_STAKED_LEVEL_VIDEO_COMMENTS: 4
          YRBL_HAPPY_IMG_URL: https://player.odycdn.com/api/v3/streams/free/yrbl-happy/7aa50a7e5adaf48691935d55e45d697547392929/839d9a
          YRBL_SAD_IMG_URL: https://player.odycdn.com/api/v3/streams/free/yrbl-sad/c2d9649633d974e5ffb503925e1f17d951f1bd0f/f262dd
