# CI for the Vite + pnpm stack
# Node version is driven by .nvmrc (mirrors package.json#engines.node ^22.0.0).
# pnpm version is driven by package.json#packageManager (read by pnpm/action-setup automatically).

name: Node.js CI

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
    branches: ['**']

env:
  DOCKERHUB_IMAGE: odyseeteam/odysee-frontend

jobs:
  # ─── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Install the pnpm version pinned in package.json#packageManager
      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      # Lockfile resolves odysee-media-usagi to SSH (git@github.com:) which
      # fails without SSH keys. Rewrite to HTTPS so pnpm can clone it.
      - name: Use HTTPS for git deps
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check (lint + format + typecheck)
        run: pnpm check

  # ─── Build ───────────────────────────────────────────────────────────────────
  build:
    name: build
    needs: [lint]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Use HTTPS for git deps
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (Vite)
        run: pnpm build
        env:
          NODE_ENV: production
          COMMIT_ID: ${{ github.sha }}
          BUILD_REV: ${{ github.sha }}

  # ─── Docker Image ────────────────────────────────────────────────────────────
  docker:
    name: docker
    needs: [build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=ref,event=branch,enable=${{ github.ref != 'refs/heads/master' }}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production
            COMMIT_ID=${{ github.sha }}
            BUILD_REV=${{ github.sha }}

  notify-slack:
    name: notify-slack
    needs: [lint, build, docker]
    if: ${{ always() }}
    runs-on: ubuntu-latest

    steps:
      - name: Build Slack payload
        id: payload
        env:
          LINT_RESULT: ${{ needs.lint.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          DOCKER_RESULT: ${{ needs.docker.result }}
          WORKFLOW_NAME: ${{ github.workflow }}
          REPOSITORY: ${{ github.repository }}
          REF: ${{ github.ref }}
          SHA: ${{ github.sha }}
          RUN_STARTED_AT: ${{ github.run_started_at }}
          ACTOR: ${{ github.actor }}
          HEAD_COMMIT_AUTHOR_NAME: ${{ github.event.head_commit.author.name }}
          HEAD_COMMIT_AUTHOR_EMAIL: ${{ github.event.head_commit.author.email }}
          PR_USER: ${{ github.event.pull_request.user.login }}
        run: |
          if [[ "$LINT_RESULT" == "failure" || "$BUILD_RESULT" == "failure" || "$DOCKER_RESULT" == "failure" ]]; then
            STATUS="failure"
          elif [[ "$LINT_RESULT" == "cancelled" || "$BUILD_RESULT" == "cancelled" || "$DOCKER_RESULT" == "cancelled" ]]; then
            STATUS="cancelled"
          else
            STATUS="success"
          fi

          AUTHOR="$ACTOR"
          if [[ -n "$HEAD_COMMIT_AUTHOR_NAME" && -n "$HEAD_COMMIT_AUTHOR_EMAIL" ]]; then
            AUTHOR="$HEAD_COMMIT_AUTHOR_NAME <$HEAD_COMMIT_AUTHOR_EMAIL>"
          elif [[ -n "$PR_USER" ]]; then
            AUTHOR="$PR_USER"
          fi

          START_EPOCH=$(date -u -d "$RUN_STARTED_AT" +%s)
          NOW_EPOCH=$(date -u +%s)
          ELAPSED_MINUTES=$(( (NOW_EPOCH - START_EPOCH + 59) / 60 ))
          if (( ELAPSED_MINUTES < 1 )); then
            ELAPSED_MINUTES=1
          fi

          TEXT=$(printf 'CI/CD\n%s (%s) of %s@%s by %s %s in %s min' "$WORKFLOW_NAME" "${SHA::8}" "$REPOSITORY" "$REF" "$AUTHOR" "$STATUS" "$ELAPSED_MINUTES")
          export TEXT
          python3 - <<'PY'
          import json
          import os

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"payload={json.dumps({'text': os.environ['TEXT']})}\n")
          PY

      - name: Post to Slack
        continue-on-error: true
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          PAYLOAD: ${{ steps.payload.outputs.payload }}
        run: |
          if [[ -z "$SLACK_WEBHOOK" ]]; then
            exit 0
          fi

          curl --fail --silent --show-error \
            -X POST \
            -H 'Content-type: application/json' \
            --data "$PAYLOAD" \
            "$SLACK_WEBHOOK"
