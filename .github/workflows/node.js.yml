# CI for the Vite + pnpm stack
# Node version is driven by .nvmrc (mirrors package.json#engines.node ^22.0.0).
# pnpm version is driven by package.json#packageManager (read by pnpm/action-setup automatically).

name: Node.js CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

env:
  DOCKERHUB_IMAGE: odyseeteam/odysee-frontend
  GHCR_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  # ─── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Install the pnpm version pinned in package.json#packageManager
      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      # Lockfile resolves odysee-media-usagi to SSH (git@github.com:) which
      # fails without SSH keys. Rewrite to HTTPS so pnpm can clone it.
      - name: Use HTTPS for git deps
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check (lint + format + typecheck)
        run: pnpm check

  # ─── Build ───────────────────────────────────────────────────────────────────
  build:
    name: build
    needs: [lint]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Use HTTPS for git deps
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (Vite)
        run: pnpm build
        env:
          NODE_ENV: production
          COMMIT_ID: ${{ github.sha }}
          BUILD_REV: ${{ github.sha }}

  # ─── Docker Image ────────────────────────────────────────────────────────────
  # Builds on: push to master (tagged as `latest` + sha)
  #            push of a tag like v1.2.3 (tagged as `1.2.3`, `1.2`, `1`, `latest`)
  docker:
    name: docker
    needs: [build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKERHUB_IMAGE }}
            ${{ env.GHCR_IMAGE }}
          tags: |
            # On master push: sha + latest
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            # On version tag push: semver tags (v1.2.3 → 1.2.3, 1.2, 1)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production
            COMMIT_ID=${{ github.sha }}
            BUILD_REV=${{ github.sha }}
