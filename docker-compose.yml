services:
  proxy:
    image: haproxy:lts
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./docker/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - odysee
    labels:
      com.centurylinklabs.watchtower.enable: "false"

  frontend:
    image: odyseeteam/odysee-frontend:${ODYSEE_FRONTEND_TAG:-latest}
    restart: unless-stopped
    init: true
    stop_grace_period: 15s
    environment:
      NODE_ENV: production
      WEB_SERVER_PORT: 1337
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-8}
      CHAINQUERY_MYSQL_PASSWORD: ${CHAINQUERY_MYSQL_PASSWORD:?set CHAINQUERY_MYSQL_PASSWORD}
      LBRY_WEB_API: ${LBRY_WEB_API:-https://api.odysee.com}
    expose:
      - "1337"
    networks:
      - odysee
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      com.centurylinklabs.watchtower.stop-signal: SIGTERM

  watchtower:
    image: containrrr/watchtower:latest
    restart: unless-stopped
    command:
      - --interval
      - "${WATCHTOWER_POLL_INTERVAL:-300}"
      - --cleanup
      - --rolling-restart
      - --label-enable
    environment:
      DOCKER_CONFIG: /config
      DOCKER_API_VERSION: ${DOCKER_API_VERSION:-1.44}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DOCKER_CONFIG_DIR:?set DOCKER_CONFIG_DIR}:/config:ro
    networks:
      - odysee
    labels:
      com.centurylinklabs.watchtower.enable: "false"

networks:
  odysee:
    name: odysee
